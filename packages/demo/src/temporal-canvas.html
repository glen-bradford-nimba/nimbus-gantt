<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nimbus Gantt — Temporal Canvas Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }
    main { flex: 1; display: flex; min-height: 0; }
    #gantt {
      flex: 1;
      min-height: 0;
      background: #fff;
      position: relative;
    }
    aside {
      width: 360px;
      background: #fff;
      border-left: 1px solid #e2e8f0;
      padding: 16px;
      overflow-y: auto;
      font-size: 13px;
      flex-shrink: 0;
    }
    aside h2 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 8px;
      margin-top: 16px;
    }
    aside h2:first-child { margin-top: 0; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    button {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      color: #334155;
    }
    button:hover { background: #e2e8f0; }
    button.primary {
      background: #3b82f6;
      border-color: #2563eb;
      color: white;
    }
    button.primary:hover { background: #2563eb; }
    button.danger {
      background: #fee2e2;
      border-color: #fca5a5;
      color: #991b1b;
    }
    pre {
      background: #0f172a;
      color: #f1f5f9;
      font-family: "SF Mono", Monaco, monospace;
      font-size: 11px;
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
      max-height: 200px;
      overflow-y: auto;
    }
    .status {
      font-size: 11px;
      color: #64748b;
      font-family: "SF Mono", Monaco, monospace;
      margin-bottom: 8px;
    }
    .status .live { color: #10b981; font-weight: 600; }
    .status .scrubbed { color: #f59e0b; font-weight: 600; }
    .kbd {
      display: inline-block;
      font-family: "SF Mono", Monaco, monospace;
      font-size: 10px;
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      border-radius: 3px;
      padding: 1px 4px;
      margin: 0 2px;
    }
    .hint {
      font-size: 11px;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <main>
      <div id="gantt"></div>
      <aside>
        <h2>Cursor</h2>
        <div class="status" id="cursor-status">cursor: <span class="live">live</span></div>
        <div class="hint">
          <span class="kbd">Home</span> baseline ·
          <span class="kbd">End</span> live ·
          <span class="kbd">Alt+←</span>/<span class="kbd">→</span> step day
        </div>
        <div class="btn-row">
          <button onclick="window.gantt.history.scrubTo(new Date(Date.now() - 86400000 * 7))">Scrub −7d</button>
          <button onclick="window.gantt.history.scrubTo(new Date(Date.now() - 86400000 * 30))">−30d</button>
          <button onclick="window.gantt.history.scrubToNow()" class="primary">↦ Now</button>
        </div>

        <h2>Agent API</h2>
        <div class="hint">All buttons go through <code>window.gantt.agent.*</code> — same surface an LLM uses.</div>
        <div class="btn-row">
          <button onclick="addRandomTask()">Add task</button>
          <button onclick="moveFirstTask()">Move first +3d</button>
          <button onclick="completeFirstTask()">Mark complete</button>
          <button onclick="removeRandomTask()" class="danger">Remove demo</button>
        </div>

        <h2>Annotations</h2>
        <div class="btn-row">
          <button onclick="addCommentAnnotation()">+ comment</button>
          <button onclick="addDecisionAnnotation()">+ decision</button>
          <button onclick="addAgentAnnotation()">+ agent-note</button>
        </div>

        <h2>Capabilities</h2>
        <pre id="capabilities"></pre>

        <h2>Snapshot (live)</h2>
        <pre id="snapshot"></pre>

        <h2>History (newest 5)</h2>
        <pre id="history"></pre>
      </aside>
    </main>
  </div>

  <script type="module">
    window.NGA_DIAG = true;
    window.__nga_diag = [];

    // Engine bundle — bring in everything that the cloudnimbus template
    // expects on the engine namespace, plus our temporal plugins.
    import * as NgCore from '@nimbus-gantt/core';
    // App-layer mount (cloudnimbus template — same chrome DH/CN use).
    import { IIFEApp } from '@nimbus-gantt/app';
    import { sampleTasks, sampleDependencies } from './sample-data.ts';

    // Sample data hardcodes TODAY=2026-04-01. Shift every date so the
    // dataset is centered on actual current date — otherwise nothing
    // looks "future" and the asymmetry plugin has nothing to render.
    const SAMPLE_PINNED_TODAY = new Date(Date.UTC(2026, 3, 1)).getTime();
    const REAL_TODAY = (() => {
      const d = new Date();
      return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
    })();
    const SHIFT_DAYS = Math.round((REAL_TODAY - SAMPLE_PINNED_TODAY) / 86400000);
    function shiftIso(iso) {
      const t = new Date(iso + 'T00:00:00Z').getTime() + SHIFT_DAYS * 86400000;
      return new Date(t).toISOString().slice(0, 10);
    }

    // IIFEApp expects NormalizedTask shape from the app layer. The fields
    // overlap with GanttTask but the app's normalizer maps `name → title`,
    // etc. For the cloudnimbus template's PriorityGrouping buckets we also
    // need a priorityGroup or groupId mapping. Sample tasks already carry
    // groupId; cloudnimbus template buckets expect 'NOW'/'NEXT'/'PLANNED'
    // values, so we map status → bucket as a coarse default.
    function statusToBucket(status) {
      if (!status) return 'PLANNED';
      const s = String(status).toLowerCase();
      if (s.includes('complete') || s.includes('done')) return 'NOW';
      if (s.includes('blocked')) return 'HOLD';
      if (s.includes('dev') || s.includes('test') || s.includes('review')) return 'NOW';
      if (s.includes('planning')) return 'NEXT';
      return 'PLANNED';
    }

    const shiftedTasks = sampleTasks.map((t) => ({
      // Required fields the app layer expects (NormalizedTask shape)
      id: t.id,
      title: t.name,
      startDate: shiftIso(t.startDate),
      endDate: shiftIso(t.endDate),
      // Pass through useful optional fields
      progress: t.progress,
      status: t.status,
      parentId: t.parentId,
      groupId: statusToBucket(t.status),
      groupName: t.groupName,
      isMilestone: t.isMilestone,
      assignee: t.assignee,
      sortOrder: t.sortOrder,
    }));

    const container = document.getElementById('gantt');

    // Mount the app with the cloudnimbus template — same chrome surface
    // DH and cloudnimbusllc.com /v12 render. Pass the core namespace as
    // the engine so PriorityGroupingPlugin / TemporalAsymmetryPlugin /
    // hoursWeightedProgress are reachable from the IIFE app's plugin
    // installer code paths.
    const handle = IIFEApp.mount(container, {
      tasks: shiftedTasks,
      dependencies: sampleDependencies,
      engine: NgCore,
      mode: 'fullscreen',
      onPatch: async (patch) => {
        // Demo doesn't persist — just log and let the engine render.
        console.log('[demo] onPatch', patch);
      },
      // Auto-installed asymmetry plugin (0.186.0). Pass a little heavier
      // fade for visibility on the demo.
      temporalAsymmetry: { futureFadeStrength: 0.55 },
    });

    // The handle exposes the underlying engine via .gantt (added in
    // 0.187.0). Install the rest of the temporal-canvas plugins on top.
    const ng = handle.gantt;
    if (ng) {
      ng.use(NgCore.HistoryPlugin({
        capacity: 2000,
        defaultActor: 'demo-user',
        onEntry: () => refreshPanel(),
        onAnnotation: () => refreshPanel(),
      }));
      ng.use(NgCore.TimeCursorPlugin({}));
      ng.use(NgCore.HistoryStripPlugin({}));
    }

    // Convenience for browser-console interaction. window.gantt is the
    // engine instance with full agent + history APIs; window.handle is
    // the IIFE app handle (setData / pushRemoteEvent / etc).
    window.gantt = ng;
    window.handle = handle;
    window.diag = () => window.__nga_diag;

    // ── Side panel renderer ─────────────────────────────────────────────
    function refreshPanel() {
      if (!ng) return;
      const cursor = ng.getTimeCursor();
      document.getElementById('cursor-status').innerHTML =
        cursor
          ? `cursor: <span class="scrubbed">${cursor.toISOString().slice(0, 10)}</span>`
          : `cursor: <span class="live">live</span>`;

      document.getElementById('capabilities').textContent =
        JSON.stringify(ng.capabilities(), null, 2);

      const snapshot = ng.agent.getSnapshot();
      document.getElementById('snapshot').textContent = JSON.stringify({
        cursorDate: snapshot.cursorDate,
        zoom: snapshot.zoomLevel,
        taskCount: snapshot.tasks.length,
        depCount: snapshot.dependencies.length,
        firstTask: snapshot.tasks[0] ? {
          id: snapshot.tasks[0].id,
          name: snapshot.tasks[0].name,
          startDate: snapshot.tasks[0].startDate,
        } : null,
      }, null, 2);

      const h = ng.agent.history();
      if (h) {
        const recent = h.entries.slice(-5).reverse().map(e => ({
          actionType: e.actionType,
          wallTs: new Date(e.wallTs).toISOString(),
          source: e.source,
        }));
        document.getElementById('history').textContent = JSON.stringify(recent, null, 2);
      } else {
        document.getElementById('history').textContent = '(history not installed)';
      }
    }

    setInterval(refreshPanel, 250);
    refreshPanel();

    // ── Demo button handlers ───────────────────────────────────────────
    let nextId = 100;
    window.addRandomTask = () => {
      if (!ng) return;
      const id = `demo-${nextId++}`;
      const start = new Date();
      start.setDate(start.getDate() + Math.floor(Math.random() * 30) - 15);
      const end = new Date(start);
      end.setDate(end.getDate() + 5 + Math.floor(Math.random() * 10));
      ng.agent.addTask({
        id,
        name: `Demo task ${id}`,
        startDate: start.toISOString().slice(0, 10),
        endDate: end.toISOString().slice(0, 10),
        status: 'Development',
      });
    };

    window.moveFirstTask = () => {
      if (!ng) return;
      const snap = ng.agent.getSnapshot();
      if (!snap.tasks.length) return;
      const t = snap.tasks[0];
      const start = new Date(t.startDate);
      start.setDate(start.getDate() + 3);
      const end = new Date(t.endDate);
      end.setDate(end.getDate() + 3);
      ng.agent.moveTask(t.id, start.toISOString().slice(0, 10), end.toISOString().slice(0, 10));
    };

    window.completeFirstTask = () => {
      if (!ng) return;
      const snap = ng.agent.getSnapshot();
      if (!snap.tasks.length) return;
      ng.agent.updateTask(snap.tasks[0].id, { progress: 1, status: 'Complete' });
    };

    window.removeRandomTask = () => {
      if (!ng) return;
      const snap = ng.agent.getSnapshot();
      const candidates = snap.tasks.filter(t => t.id.startsWith('demo-'));
      if (!candidates.length) return;
      const target = candidates[Math.floor(Math.random() * candidates.length)];
      ng.agent.removeTask(target.id);
    };

    window.addCommentAnnotation = () => {
      if (!ng) return;
      const snap = ng.agent.getSnapshot();
      const t = snap.tasks[Math.floor(Math.random() * snap.tasks.length)];
      ng.agent.appendAnnotation('comment', t?.id, {
        author: 'demo-user',
        text: `comment on ${t?.name ?? 'unknown'}`,
      });
    };

    window.addDecisionAnnotation = () => {
      if (!ng) return;
      ng.agent.appendAnnotation('decision', undefined, {
        text: 'Decision recorded at ' + new Date().toLocaleTimeString(),
      });
    };

    window.addAgentAnnotation = () => {
      if (!ng) return;
      ng.agent.appendAnnotation('agent-note', undefined, {
        suggestion: 'Consider rebalancing capacity in week 3',
      });
    };

    console.log(
      '%c[Temporal Canvas Demo loaded — cloudnimbus template]',
      'font-weight: bold; color: #3b82f6;',
      '\n\nTry these in the console:\n' +
        '  window.gantt.agent.getSnapshot()\n' +
        '  window.gantt.agent.scrubTo("2026-01-01")\n' +
        '  window.gantt.agent.scrubTo(null)\n' +
        '  window.gantt.history.entries()\n' +
        '  window.gantt.capabilities()\n' +
        '  window.handle.pushRemoteEvent({...})\n' +
        '  window.diag()\n'
    );
  </script>
</body>
</html>
